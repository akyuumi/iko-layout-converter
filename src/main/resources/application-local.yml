spring:
  datasource:
    url: ${IKO_DB_URL:jdbc:oracle:thin:@localhost:1521/FREEPDB1}
    username: ${IKO_DB_USER:SOURCE_SCHEMA}
    password: ${IKO_DB_PASSWORD:password}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      pool-name: iko-layout-converter-local
      maximum-pool-size: ${IKO_DB_POOL_SIZE:2}
      minimum-idle: 0
      connection-timeout: ${IKO_DB_CONNECTION_TIMEOUT_MS:30000}
      validation-timeout: ${IKO_DB_VALIDATION_TIMEOUT_MS:5000}

migration:
  source-schema: ${IKO_SOURCE_SCHEMA:SOURCE_SCHEMA}
  target-schema: ${IKO_TARGET_SCHEMA:TARGET_SCHEMA}
  commit-size: ${IKO_COMMIT_SIZE:10000}
  tasks: ${IKO_TASKS:SAMPLE_CUSTOMER}
